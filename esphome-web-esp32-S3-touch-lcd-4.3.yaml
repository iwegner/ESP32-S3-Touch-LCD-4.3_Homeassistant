sensor:
  # WI-FI Signal Strength in %
  - platform: wifi_signal
    id: wifi_signal_percent
    update_interval: 30s
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    on_value: 
      then:
        - lvgl.label.update:
            id: value_wifi_status
            text_color: !lambda |-
              if (id(wifi_signal_percent).state > 30) {
                return lv_color_hex(0x5CA848);
              }
              return lv_color_hex(0xff0000);
            text:
              format: "%.1f%%"
              args: [id(wifi_signal_percent).state]

  # Home Assistant Imports
  #  PV Inverter
  - platform: homeassistant
    id: grid_power
    entity_id: sensor.hostname_wechselrichterwegner_grid_power
    name: "Netzbezug (HA)"
    on_value:
      then:
        - lambda: |-
            id(last_grid_power) = id(grid_power).state;
        - lambda: id(last_update_timestamp) = (double)::time(nullptr);
        - lvgl.label.update:
            id: value_pv_imported_power
            text:
                format: "%.0f W -->"
                args: [id(grid_power).state]
        - lvgl.label.update:
            id: value_pv_imported_power
            text_color: !lambda |-
              if (id(grid_power).state < 5) {
                return lv_color_hex(0x00FF00);   // green
              } else {
                return lv_color_hex(0xFFFFFF);   // white
              }


  - platform: homeassistant
    id: pv_current_production
    entity_id: sensor.hostname_wechselrichterwegner_sum_power_of_all_pv_dc_inputs
    name: "PV aktuelle Produktion (HA)"
    on_value:
      then:
        - lambda: |-
            id(last_pv_current_production) = id(pv_current_production).state;
        - lambda: id(last_update_timestamp) = (double)::time(nullptr);
        - lvgl.label.update:
            id: value_pv_current_production
            text:
                format: "%.0f W ->"
                args: [id(pv_current_production).state]

  - platform: homeassistant
    id: battery_soc_ha
    entity_id: sensor.hostname_wechselrichterwegner_battery_soc
    name: "Wechselrichter Battery SoC (HA)"
    on_value:
      then:
        - lambda: |-
            id(last_battery_soc) = id(battery_soc_ha).state;
        - lambda: id(last_update_timestamp) = (double)::time(nullptr);
        # Update the text
        - lvgl.label.update: 
            id: value_pv_battery_level
            text:
                format: "%.0f %% ->"
                args: [id(battery_soc_ha).state]
        # Update the color based on value
        - lvgl.label.update:
            id: value_pv_battery_level
            text_color: !lambda |-
              float soc = id(battery_soc_ha).state;

              if (soc == 100) {
                return lv_color_hex(0x00FF00);   // green
              } else if (soc < 5) {
                return lv_color_hex(0xFF0000);   // red
              } else {
                return lv_color_hex(0xFFFF00);   // yellow
              }

