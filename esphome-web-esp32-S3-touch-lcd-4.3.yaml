color:
  - id: color_black
    hex: 0d0d0d
  - id: color_steel_blue
    hex: 606682
  - id: color_misty_blue
    hex: 9BA2BC
  - id: color_green
    hex: 5CA848
  - id: color_red
    hex: ff0000  
  - id: color_white
    hex: ffffff  

# Todo: have humidity and temperature turn red color when above a threshold

###############################################
# SCRIPT – restore all labels after wake
###############################################
script:
  - id: restore_display_values
    then:
      - lvgl.label.update:
          id: value_pv_imported_power
          text:
            format: "%.0f W -->"
            args: [id(last_grid_power)]

      - lvgl.label.update:
          id: value_pv_current_production
          text:
            format: "%.0f W ->"
            args: [id(last_pv_current_production)]

      - lvgl.label.update:
          id: value_pv_battery_level
          text:
            format: "%.0f %% ->"
            args: [id(last_battery_soc)]

      - lvgl.label.update:
          id: value_pv_energy_consumption
          text:
            format: "-> %.0f W"
            args: [id(last_pv_energy_consumption)]

      - lvgl.label.update:
          id: value_humidity_attic
          text:
            format: "%.1f %%"
            args: [id(last_humidity_attic)]

      - lvgl.label.update:
          id: value_temperature_attic
          text:
            format: "%.1f °"
            args: [id(last_temperature_attic)]

      - lvgl.label.update:
          id: value_humidity_1st_office
          text:
            format: "%.1f %%"
            args: [id(last_humidity_1st_office)]

      - lvgl.label.update:
          id: value_temperature_1st_office
          text:
            format: "%.1f °"
            args: [id(last_temperature_1st_office)]

      - lvgl.label.update:
          id: value_humidity_1st_felix
          text:
            format: "%.1f %%"
            args: [id(last_humidity_1st_felix)]

      - lvgl.label.update:
          id: value_temperature_1st_felix
          text:
            format: "%.1f °"
            args: [id(last_temperature_1st_felix)]

      - lvgl.label.update:
          id: value_humidity_1st_bathroom
          text:
            format: "%.1f %%"
            args: [id(last_humidity_1st_bathroom)]

      - lvgl.label.update:
          id: value_temperature_1st_bathroom
          text:
            format: "%.1f °"
            args: [id(last_temperature_1st_bathroom)]

      - lvgl.label.update:
          id: value_humidity_1st_bedroom
          text:
            format: "%.1f %%"
            args: [id(last_humidity_1st_bedroom)]

      - lvgl.label.update:
          id: value_temperature_1st_bedroom
          text:
            format: "%.1f °"
            args: [id(last_temperature_1st_bedroom)]

      - lvgl.label.update:
          id: value_humidity_ground_livingroom
          text:
            format: "%.1f %%"
            args: [id(last_humidity_ground_livingroom)]
      - lvgl.label.update:
          id: value_humidity_base_linus_room
          text:
            format: "%.1f %%"
            args: [id(last_humidity_base_linus_room)]
      - lvgl.label.update:
          id: value_humidity_base_bathroom
          text:
            format: "%.1f %%"
            args: [id(last_humidity_base_bathroom)]
      - lvgl.label.update:
          id: value_temperature_ground_livingroom
          text:
            format: "%.1f °"
            args: [id(last_temperature_ground_livingroom)]
      - lvgl.label.update:
