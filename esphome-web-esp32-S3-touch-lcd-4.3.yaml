      - lvgl.label.update:
          id: value_temperature_base_bathroom
          text:
            format: "%.1f °"
            args: [id(last_temperature_base_bathroom)]

# Enable logging
logger:

# Enable Home Assistant API
api:
   on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus

   on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  # maybe needs networks: and then intended
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - lvgl.label.update:
        id: value_wifi_status
        text_color: color_green
  on_disconnect:
    - lvgl.label.update:
        id: value_wifi_status
        text_color: color_red

ch422g:
  - id: ch422g_hub

psram:
  mode: octal
  speed: 80MHz

i2c:
  sda: 8
  scl: 9
  scan: true
  frequency: 400kHz

# Todo: keep device connected and not deepsleep (only during the night)
# Switch to turn backlight back on
switch:
  - platform: gpio
    name: backlight
    id: display_backlight
    pin:
      ch422g: ch422g_hub
      number: 2
      mode:
        output: true
      inverted: False
    restore_mode: ALWAYS_ON
  # Antiburn Switch
  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:

# Timer for Antiburn 
time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - hours: 2,3,4,5
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 2,3,4,5
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn
      - minutes: '*'
        seconds: 0
        then:
          - lvgl.label.update:
              id: time_value
              text: !lambda 'return id(homeassistant_time).now().strftime("%H:%M");'
          - lvgl.label.update:
              id: last_updated
              text: !lambda 'auto now = (double)::time(nullptr); auto diff = now - id(last_update_timestamp); char buf[50]; sprintf(buf, "Updated: %ds ago", (int)diff); return std::string(buf);'

# Number to track backlight timeout
number:
  - platform: template
    name: LVGL Screen timeout
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 60
    restore_value: true
    min_value: 10
    max_value: 180
    step: 5
    mode: box    

touchscreen:
  - platform: gt911
    id: my_touchscreen
    interrupt_pin: 4
    reset_pin:
      ch422g: ch422g_hub
      number: 1
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            #- lvgl.widget.redraw: # don't redraw or the previously received values are gone
            - switch.turn_on: display_backlight
            # Restore all labels
            - script.execute: restore_display_values

display:
  - platform: rpi_dpi_rgb
    id: rpi_disp
    #update_interval: never
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 16MHz
    dimensions:
      width: 800
      height: 480
    reset_pin:
      ch422g: ch422g_hub
      number: 3
    enable_pin:
      ch422g:
      number: 2
    de_pin:
      number: 5
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    pclk_pin: 7
    hsync_back_porch: 30
    hsync_front_porch: 210
    hsync_pulse_width: 30
    vsync_back_porch: 4
    vsync_front_porch: 4
    vsync_pulse_width: 4
    data_pins:
      red: [1, 2, 42, 41, 40]
      blue: [14, 38, 18, 17, 10]
      green: [39, 0, 45, 48, 47, 21]

# Draw the dashboard
lvgl:
  displays:
    - rpi_disp
  touchscreens:
    - my_touchscreen
  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - logger.log: "LVGL is idle"
      - switch.turn_off: display_backlight
      - lvgl.pause:

